<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Facilities Orbit – Executive Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
@font-face { font-family:'72 Condensed'; src:local('72 Condensed'); }
body{font-family:'72 Condensed',Arial;margin:0;background:#f4f6f9;}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  background:white;
  border-bottom:2px solid #e0e0e0;
}

.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.header-left img{height:40px;}

.wafi-logo{height:40px;}

.header img{height:40px;margin-right:15px;}

.header-title{
font-size:22px;color:#404040;font-weight:bold;text-transform:uppercase;
}

.layout{display:flex;height:calc(100vh - 62px);}

.sidebar{
width:220px;background:#404040;color:white;
display:flex;flex-direction:column;padding-top:20px;
}

.sidebar h4{
  padding:10px 20px;
  margin:10px 0 5px 0;
  background:#2f2f2f;
  border-left:4px solid #16a34a;
}

.sidebar a{color:white;padding:10px 30px;text-decoration:none;display:block;}
.sidebar a:hover{background:#505050;}
.sidebar .logout{margin-top:auto;border-top:1px solid #555;}

.main{flex:1;padding:20px;overflow-y:auto;}

.section-title{
 margin-top:25px;
 font-size:22px;
 font-weight:bold;
 border-bottom:3px solid #76B531;
 padding-bottom:6px;
}

/* KPI */
.kpi-container{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:15px;margin-top:15px;
}

.kpi{
 background:white;padding:20px;border-radius:6px;
 box-shadow:0 2px 6px rgba(0,0,0,0.1);
 text-align:center;
}

.kpi h3{
 margin:0;
 font-size:40px;
 color:#76B531;
}

.kpi p{
 margin-top:5px;
 color:#666;
 font-weight:600;
}

/* impact KPI */
.impact-title{font-weight:bold;margin-bottom:10px;}
.impact-line{display:flex;justify-content:space-between;margin-bottom:6px;}
.impact-line .value{color:#76B531;font-weight:bold;font-size:18px}

/* 4 column sections */
.section-grid{
 display:grid;
 grid-template-columns:repeat(4,1fr);
 gap:20px;
 margin-top:20px;
}

.card{
 background:white;
 padding:15px;
 border-radius:6px;
 box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card-title{
 font-weight:bold;
 text-align:center;
 margin-bottom:10px;
}

.card canvas{
 width:100%!important;
 height:260px!important;
}

table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#76B531;color:white;padding:6px;}
td{border:1px solid #ddd;padding:6px;}

.filter-bar{margin-bottom:20px}

/* NEW FILTER STYLE */
.filter{
display:inline-block;
position:relative;
margin-right:20px;
}

.filter button{
padding:6px 10px;
border:1px solid #ccc;
background:white;
cursor:pointer;
border-radius:4px;
}

.dropdown{
display:none;
position:absolute;
background:white;
border:1px solid #ccc;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
padding:10px;
max-height:200px;
overflow-y:auto;
z-index:100;
}

.dropdown label{
display:block;
font-size:13px;
margin-bottom:4px;
}
</style>
</head>

<body>

<div class="header">

  <div class="header-left">
    <img src="orbit-logo.png">
    <h1 class="header-title">M&D FACILITIES – ORBIT PORTAL</h1>
  </div>

  <img src="wafi-logo.png" class="wafi-logo">

</div>


<div class="layout">

<div class="sidebar">

  <a href="dashboard.html"><h4>INITIATIVE</h4></a>
  <a href="dashboard.html">Dashboard</a>
  <a href="index.html">All Initiatives - List</a>
  <a href="add-initiative.html">Add New Initiative</a>
  
   <a href="projects.html"><h4>PROJECTS</h4></a>

   <a href="assurances.html"><h4>ASSURANCE</h4></a>

   <a href="people-employees.html"><h4>PEOPLE</h4></a>

   <a href="financial-dashboard.html"><h4>FINANCIAL</h4></a>
  
  <a href="mydetails.html" class="logout">My Details</a>
  <a href="#" onclick="logout()" class="logout">Logout</a>

</div>

<div class="main">

<h2>Executive Dashboard</h2>

<div class="filter-bar">

<div class="filter">
<button onclick="toggleDropdown('terminalDropdown')">Terminal ▾</button>

<div id="terminalDropdown" class="dropdown">

<label><input type="checkbox" id="terminalAll"> All</label>

<label><input type="checkbox" class="terminal" value="KMR"> KMR</label>
<label><input type="checkbox" class="terminal" value="CKL"> CKL</label>
<label><input type="checkbox" class="terminal" value="MCH"> MCH</label>
<label><input type="checkbox" class="terminal" value="SKP"> SKP</label>
<label><input type="checkbox" class="terminal" value="DLP"> DLP</label>
<label><input type="checkbox" class="terminal" value="TJB"> TJB</label>
<label><input type="checkbox" class="terminal" value="BHK"> BHK</label>
<label><input type="checkbox" class="terminal" value="SSH"> SSH</label>
<label><input type="checkbox" class="terminal" value="VHR"> VHR</label>
<label><input type="checkbox" class="terminal" value="GTI"> GTI</label>
<label><input type="checkbox" class="terminal" value="MMK"> MMK</label>

</div>
</div>

<div class="filter">
<button onclick="toggleDropdown('yearDropdown')">Year ▾</button>

<div id="yearDropdown" class="dropdown">

<label><input type="checkbox" id="yearAll"> All</label>

<label><input type="checkbox" class="year" value="2025"> 2025</label>
<label><input type="checkbox" class="year" value="2026"> 2026</label>
<label><input type="checkbox" class="year" value="2027"> 2027</label>
<label><input type="checkbox" class="year" value="2028"> 2028</label>
<label><input type="checkbox" class="year" value="2029"> 2029</label>
<label><input type="checkbox" class="year" value="2030"> 2030</label>

</div>
</div>

</div>

<!-- THE REST OF YOUR DASHBOARD IS IDENTICAL -->

<script>

function toggleDropdown(id){
const el=document.getElementById(id);
el.style.display = el.style.display==="block" ? "none":"block";
}

document.getElementById("terminalAll").addEventListener("change",function(){
document.querySelectorAll(".terminal").forEach(cb=>cb.checked=this.checked);
loadKPIs();
});

document.getElementById("yearAll").addEventListener("change",function(){
document.querySelectorAll(".year").forEach(cb=>cb.checked=this.checked);
loadKPIs();
});

document.querySelectorAll(".terminal,.year").forEach(cb=>{
cb.addEventListener("change",loadKPIs);
});

</script>
