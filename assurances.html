<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Assurances Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@font-face { font-family:'72 Condensed'; src:local('72 Condensed'); }
body{font-family:'72 Condensed',Arial;margin:0;background:#f4f6f9;}
.header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:white;border-bottom:2px solid #e0e0e0;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-left img{height:40px;}
.wafi-logo{height:40px;}
.header-title{font-size:22px;color:#404040;font-weight:bold;text-transform:uppercase;}
.layout{display:flex;height:calc(100vh - 62px);}
.sidebar{width:220px;background:#404040;color:white;display:flex;flex-direction:column;padding-top:20px;}
.sidebar h4{padding:10px 20px;margin:0;}
.sidebar a{color:white;padding:10px 30px;text-decoration:none;display:block;}
.sidebar a:hover{background:#505050;}
.sidebar .logout{margin-top:auto;border-top:1px solid #555;}
.main{flex:1;padding:20px;overflow-y:auto;}
table{width:100%;border-collapse:collapse;background:white;box-shadow:0 2px 6px rgba(0,0,0,0.1);}
th,td{border:1px solid #ddd;padding:10px;}
th{background:#76B531;color:white;font-weight:bold;}
tr:nth-child(even){background:#f9f9f9;}
tr:hover{background:#eef3f8;}
.indicator{padding:4px 8px;border-radius:4px;font-weight:bold;text-align:center;}
.open{background:#e67e22;color:white;}
.closed{background:#777;color:white;}
.overdue{background:#e74c3c;color:white;}
a.assurance-link{color:#76B531;text-decoration:none;font-weight:bold;}
</style>
</head>

<body>

<div class="header">
<div class="header-left">
<img src="orbit-logo.png">
<h1 class="header-title">M&D FACILITIES – ORBIT PORTAL</h1>
</div>
<img src="wafi-logo.png" class="wafi-logo">
</div>

<div class="layout">

<div class="sidebar">
<h4>ASSURANCE</h4>
<a href="assurances.html">All Assurances</a>
<a href="add-assurance.html">Add Assurance</a>

<h4>INITIATIVE</h4>
<a href="index.html">All Initiatives</a>

<h4>PROJECTS</h4>
<a href="projects.html">All Projects</a>

<a href="#" onclick="logout()" class="logout">Logout</a>
</div>

<div class="main">

<h2>Assurance List</h2>

<table>
<thead>
<tr>
<th>S.No</th>
<th>Depot</th>
<th>Assurance Name</th>
<th>Owner</th>
<th>Status</th>
<th>Total Findings</th>
<th>Open</th>
<th>Overdue</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

</div>
</div>

<script>
const supabaseClient = supabase.createClient( "https://kqhbvmqxrwwspopwckah.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxaGJ2bXF4cnd3c3BvcHdja2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3MTYyOTAsImV4cCI6MjA4NjI5MjI5MH0.uKfFMK7GBtCR8P5n7hsJlN72-w5h0oyOhuaySphmns8" );

async function loadData(){

const {data:assurances} = await supabaseClient.from("assurances").select("*");
const {data:findings} = await supabaseClient.from("assurance_findings").select("*");

let html="";
const today=new Date().toISOString().split("T")[0];

assurances.forEach((a,index)=>{

const related=findings.filter(f=>f.assurance_id===a.id);
const total=related.length;
const open=related.filter(f=>f.status!=="Closed").length;
const overdue=related.filter(f=>f.status!=="Closed" && f.target_date && f.target_date<today).length;

let indicatorClass=a.status==="Closed"?"closed":"open";

html+=`
<tr>
<td>${index+1}</td>
<td>${a.depot}</td>
<td><a class="assurance-link" href="assurance-detail.html?id=${a.id}">${a.assurance_name}</a></td>
<td>${a.assurance_owner_email}</td>
<td><div class="indicator ${indicatorClass}">${a.status}</div></td>
<td>${total}</td>
<td>${open}</td>
<td><div class="indicator ${overdue>0?"overdue":"open"}">${overdue}</div></td>
</tr>`;
});

document.getElementById("tableBody").innerHTML=html;
}

async function logout(){
await supabaseClient.auth.signOut();
window.location="login.html";
}

loadData();
</script>

</body>
</html>
