<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Finding Detail</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@font-face { font-family:'72 Condensed'; src:local('72 Condensed'); }

body{font-family:'72 Condensed',Arial;margin:0;background:#f4f6f9;}

.header{
display:flex;align-items:center;justify-content:space-between;
padding:10px 20px;background:white;border-bottom:2px solid #e0e0e0;
}
.header-left{display:flex;align-items:center;gap:12px;}
.header-left img{height:40px;}
.wafi-logo{height:40px;}
.header-title{
font-size:22px;color:#404040;font-weight:bold;text-transform:uppercase;
}

.layout{display:flex;height:calc(100vh - 62px);}
.sidebar{
width:220px;background:#404040;color:white;
display:flex;flex-direction:column;padding-top:20px;
}
.sidebar h4{padding:10px 20px;margin:0;}
.sidebar a{color:white;padding:10px 30px;text-decoration:none;display:block;}
.sidebar a:hover{background:#505050;}
.sidebar .logout{margin-top:auto;border-top:1px solid #555;}

.main{flex:1;padding:20px;overflow-y:auto;}

.container{
background:white;
padding:20px;
border-radius:6px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
margin-bottom:20px;
}

.form-row{
display:flex;
align-items:center;
margin-bottom:10px;
}
.form-row label{
flex:0 0 200px;
font-weight:bold;
}
.form-row input,
.form-row select,
.form-row textarea{
flex:1;
padding:6px;
border-radius:4px;
border:1px solid #ccc;
font-family:'72 Condensed';
}

button{
padding:8px 14px;
background:#76B531;
color:white;
border:none;
border-radius:4px;
cursor:pointer;
margin-top:10px;
}

.warning{color:#c0392b;font-weight:bold;}
.success{color:green;}
</style>
</head>

<body>

<div class="header">
<div class="header-left">
<img src="orbit-logo.png">
<h1 class="header-title">M&D FACILITIES – ORBIT PORTAL</h1>
</div>
<img src="wafi-logo.png" class="wafi-logo">
</div>

<div class="layout">

<div class="sidebar">
<h4>ASSURANCE</h4>
<a href="assurances.html">All Assurances</a>
<a href="#" onclick="logout()" class="logout">Logout</a>
</div>

<div class="main">

<div class="container">
<h3>Finding Details</h3>

<div class="form-row">
<label>Finding Title</label>
<input id="finding_title">
</div>

<div class="form-row">
<label>Action Required</label>
<textarea id="action_required"></textarea>
</div>

<div class="form-row">
<label>Status</label>
<select id="status">
<option>Open</option>
<option>In Progress</option>
<option>Closed</option>
</select>
</div>

<div class="form-row">
<label>Action Taken</label>
<textarea id="action_taken"></textarea>
</div>

<div class="form-row">
<label>Target Date</label>
<input type="date" id="target_date">
</div>

<button onclick="save()">Save Changes</button>

<p class="success" id="successMsg" style="display:none;">Updated Successfully</p>
<p class="warning" id="lockedMsg" style="display:none;">
You do not have permission to modify this finding.
</p>

</div>
</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://kqhbvmqxrwwspopwckah.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxaGJ2bXF4cnd3c3BvcHdja2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3MTYyOTAsImV4cCI6MjA4NjI5MjI5MH0.uKfFMK7GBtCR8P5n7hsJlN72-w5h0oyOhuaySphmns8"
);

const id = new URLSearchParams(window.location.search).get("id");

let currentData=null;
let isSuperUser=false;
let isAssuranceOwner=false;
let isActionOwner=false;

async function checkSuperUser(email){
const {data}=await supabaseClient
.from("superusers")
.select("*")
.eq("email",email);
return data.length>0;
}

async function load(){

const session = await supabaseClient.auth.getSession();
const userEmail = session.data.session.user.email.toLowerCase();

const {data:finding}=await supabaseClient
.from("assurance_findings")
.select("*")
.eq("id",id)
.single();

currentData=finding;

const {data:assurance}=await supabaseClient
.from("assurances")
.select("*")
.eq("id",finding.assurance_id)
.single();

isSuperUser = await checkSuperUser(userEmail);
isAssuranceOwner = (assurance.assurance_owner_email||"").toLowerCase()===userEmail;
isActionOwner = (finding.action_owner_email||"").toLowerCase()===userEmail;

// Populate fields fresh
document.getElementById("finding_title").value=finding.finding_title||"";
document.getElementById("action_required").value=finding.action_required||"";
document.getElementById("status").value=finding.status;
document.getElementById("action_taken").value=finding.action_taken||"";
document.getElementById("target_date").value=finding.target_date||"";

// Default disable all
document.querySelectorAll("input,textarea,select")
.forEach(el=>el.disabled=true);

// Superuser & Assurance Owner
if(isSuperUser || isAssuranceOwner){
document.querySelectorAll("input,textarea,select")
.forEach(el=>el.disabled=false);
return;
}

// Action Owner
if(isActionOwner){

// If already closed → completely locked
if(finding.status === "Closed"){
return; // keep everything disabled
}

// If not closed:
document.getElementById("status").disabled = false;
document.getElementById("action_taken").disabled = false;

return;
}

// Others
document.getElementById("lockedMsg").style.display="block";
}

async function save(){

let updates={};

const newStatus=document.getElementById("status").value;

// Prevent reopening
if(currentData.status==="Closed" &&
newStatus!=="Closed" &&
!(isSuperUser||isAssuranceOwner)){
alert("Closed findings cannot be reopened.");
return;
}

// Action Owner
if(isActionOwner && !isSuperUser && !isAssuranceOwner){
updates.status=newStatus;
updates.action_taken=document.getElementById("action_taken").value;
}
else{
// Full control
updates.finding_title=document.getElementById("finding_title").value;
updates.action_required=document.getElementById("action_required").value;
updates.status=newStatus;
updates.action_taken=document.getElementById("action_taken").value;

if(document.getElementById("target_date").value!==currentData.target_date){
updates.target_date=document.getElementById("target_date").value;
updates.target_date_revision_count=
(currentData.target_date_revision_count||0)+1;
}
}

// Auto closed date
if(newStatus==="Closed" && currentData.status!=="Closed"){
updates.closed_date=new Date().toISOString().split("T")[0];
}

await supabaseClient
.from("assurance_findings")
.update(updates)
.eq("id",id);

successMsg.style.display="block";
load(); // reload fresh values
}

async function logout(){
await supabaseClient.auth.signOut();
window.location="login.html";
}

load();

</script>

</body>
</html>
