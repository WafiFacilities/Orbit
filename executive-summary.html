async function checkAuth() {
  const { data: { session } } = await supabase.auth.getSession();

  if (session) {
    window.currentUser = session.user;
    return; // ✅ user is logged in
  }

  // If no session yet, wait for auth state
  supabase.auth.onAuthStateChange((event, session) => {
    if (!session) {
      window.location.replace("login.html");
    }
  });
}

checkAuth();

 
const depots=["KMR","SKP","DLP","CKL","TJB","MCH","BKR","VHR","MHK","GTI"];

async function loadDashboard(){

const year=parseInt(document.getElementById("yearFilter").value);
 const lastYear = year - 1;
const currentMonth = new Date().getMonth() + 1;
const defaultMonth = currentMonth === 1 ? 12 : currentMonth - 1;

const month = parseInt(document.getElementById("monthFilter")?.value || defaultMonth);
 const lod1Month = parseInt(document.getElementById("lod1MonthFilter")?.value || month);

const {data:initiatives}=await supabaseClient
.from("initiatives")
.select("*")
.eq("year",year);

const {data:assurances}=await supabaseClient
.from("assurances")
.select("*")
.gte("planned_start_date", `${year}-01-01`)
.lte("planned_start_date", `${year}-12-31`);

const {data:actions}=await supabaseClient
.from("assurance_findings").select("*");

const {data:volumeCY}=await supabaseClient
.from("volume_data")
.select("*")
.eq("year",year);

const {data:volumeLY}=await supabaseClient
.from("volume_data")
.select("*")
.eq("year",year-1);

const {data:directCY}=await supabaseClient
.from("direct_cost_data")
.select("*")
.eq("year",year);

const {data:directLY}=await supabaseClient
.from("direct_cost_data")
.select("*")
.eq("year",year-1);

const {data:indirectCY}=await supabaseClient
.from("indirect_cost_data")
.select("*")
.eq("year",year);

const {data:indirectLY}=await supabaseClient
.from("indirect_cost_data")
.select("*")
.eq("year",year-1);

const today=new Date().toISOString().split("T")[0];
function sum(data,depot){
return data
.filter(x=>x.depot===depot && x.month<=month)
.reduce((s,x)=>s+(x.value||0),0);
}

function unitCost(cost,volume){
if(!volume) return 0;
return (cost/volume).toFixed(2);
}


function row(title,fn,mode="total"){

let html=`<tr><td class="metric">${title}</td>`;

let total=0;

depots.forEach(d=>{
const val = fn(d) || 0;

const num = typeof val === "string"
? parseFloat(val.replace(/<[^>]*>/g,""))
: val;

total += num || 0;

html+=`<td class="value">${val}</td>`;
});

if(mode==="total"){
html+=`<td class="value"><b>${total}</b></td>`;
}

if(mode==="sh"){
const shVal = fn("Total Facilities") || 0;
html+=`<td class="value"><b>${shVal}</b></td>`;
}

html+="</tr>";

return html;
}

 let html=""; 


 html+=`
<tr>
<th>Metric</th>
<th>KMR</th>
<th>SKP</th>
<th>DLP</th>
<th>CKL</th>
<th>TJB</th>
<th>MCH</th>
<th>BKR</th>
<th>VHR</th>
<th>MHK</th>
<th>GTI</th>
<th class="total-col">Total</th>
</tr>
`;

html+=row("# of Initiatives",d=>
initiatives.filter(i=>i.terminal_name===d).length
);

html+=row("# of Closed Initiatives",d=>
initiatives.filter(i=>i.terminal_name===d && (i.status||"").toLowerCase().startsWith("closed")).length
);

html+=row("G2G Improvement (Min)",d=>
initiatives.filter(i=>i.terminal_name===d && (i.impact_type||"").toLowerCase().includes("g2g"))
.reduce((s,i)=>s+(parseFloat(i.impact_amount)||0),0)
);

html+=row("Capacity Enhancement (MT)",d=>
initiatives.filter(i=>i.terminal_name===d && (i.impact_type||"").toLowerCase().includes("capacity"))
.reduce((s,i)=>s+(parseFloat(i.impact_amount)||0),0)
);

html+=row("Cost Avoidance (PKR M)",d=>
(
initiatives.filter(i=>i.terminal_name===d && (i.impact_type||"").toLowerCase().includes("avoid"))
.reduce((s,i)=>s+(parseFloat(i.impact_amount)||0),0)
/1000000
).toFixed(1) 
);

html+=row("Cost Saving (PKR M)",d=>
(
initiatives.filter(i=>i.terminal_name===d && (i.impact_type||"").toLowerCase().includes("saving"))
.reduce((s,i)=>s+(parseFloat(i.impact_amount)||0),0)
/1000000
).toFixed(1) 
);

html+=`<tr class="section">
<td colspan="12">
Assurance LOD1 - KPIs &nbsp;&nbsp;
<select id="lod1MonthFilter" style="padding:3px;font-family:'72 Condensed';">
<option value="1">Jan</option>
<option value="2">Feb</option>
<option value="3">Mar</option>
<option value="4">Apr</option>
<option value="5">May</option>
<option value="6">Jun</option>
<option value="7">Jul</option>
<option value="8">Aug</option>
<option value="9">Sep</option>
<option value="10">Oct</option>
<option value="11">Nov</option>
<option value="12">Dec</option>
</select>
</td>
</tr>`;
 html+=`
<tr>
<th>Metric</th>
<th>KMR</th>
<th>SKP</th>
<th>DLP</th>
<th>CKL</th>
<th>TJB</th>
<th>MCH</th>
<th>BKR</th>
<th>VHR</th>
<th>MHK</th>
<th>GTI</th>
<th class="total-col">Total</th>
</tr>
`;

html+=row("# of LOD1 Planned",d=>
assurances.filter(a=>{
if(a.depot!==d) return false;
if(a.assurance_type!=="LOD1") return false;
if(!a.planned_start_date) return false;

const dt = new Date(a.planned_start_date);

return dt.getFullYear()==year && dt.getMonth()+1 <= lod1Month;
}).length
);

html+=row("# of LOD1 Closed",d=>{

const planned = assurances.filter(a=>{
if(a.depot!==d) return false;
if(a.assurance_type!=="LOD1") return false;
if(!a.planned_start_date) return false;

const dt = new Date(a.planned_start_date);
return dt.getFullYear()==year && dt.getMonth()+1 <= lod1Month;

}).length;

const closed = assurances.filter(a=>{
if(a.depot!==d) return false;
if(a.assurance_type!=="LOD1") return false;
if(!a.date_of_assurance) return false;

const dt = new Date(a.date_of_assurance);
return dt.getFullYear()==year && dt.getMonth()+1 <= lod1Month;

}).length;

let cls = closed >= planned ? "kpi-good" : "kpi-bad";

return `<span class="${cls}">${closed}</span>`;

});

html+=row("# of LOD1 Overdue",d=>{

const overdue = assurances.filter(a=>{

if(a.depot!==d) return false;
if(a.assurance_type!=="LOD1") return false;
if(!a.planned_finish_date) return false;
if(a.date_of_assurance) return false;

const dt = new Date(a.planned_finish_date);

return dt.getFullYear()==year && dt.getMonth()+1 <= lod1Month;

}).length;

let cls = overdue > 0 ? "kpi-bad" : "kpi-good";

return `<span class="${cls}">${overdue}</span>`;

});
html+=row("Total Actions LOD1",d=>
actions.filter(f=>{
const a=assurances.find(x=>x.id===f.assurance_id);
return a && a.depot===d && a.assurance_type==="LOD1";
}).length
);

html+=row("Open Actions LOD1",d=>
actions.filter(f=>{
const a=assurances.find(x=>x.id===f.assurance_id);
return a && a.depot===d && a.assurance_type==="LOD1" && f.status!=="Closed";
}).length
);

html+=row("Overdue Actions LOD1",d=>{

const overdue = actions.filter(f=>{
const a=assurances.find(x=>x.id===f.assurance_id);
return a && a.depot===d && a.assurance_type==="LOD1" && f.status!=="Closed" && f.target_date && f.target_date<today;
}).length;

let cls = overdue > 0 ? "kpi-bad" : "kpi-good";

return `<span class="${cls}">${overdue}</span>`;

});

html+=`<tr class="section"><td colspan="12">Assurance LOD2&3 - KPIs</td></tr>`;
 html+=`
<tr>
<th>Metric</th>
<th>KMR</th>
<th>SKP</th>
<th>DLP</th>
<th>CKL</th>
<th>TJB</th>
<th>MCH</th>
<th>BKR</th>
<th>VHR</th>
<th>MHK</th>
<th>GTI</th>
<th class="total-col">Total</th>
</tr>
`;

html+=row("# of LOD2/LOD3",d=>
assurances.filter(a=>a.depot===d && (a.assurance_type==="LOD2"||a.assurance_type==="LOD3")).length
);

html+=row("Total Actions LOD2/3",d=>
actions.filter(f=>{
const a=assurances.find(x=>x.id===f.assurance_id);
return a && a.depot===d && (a.assurance_type==="LOD2"||a.assurance_type==="LOD3");
}).length
);

html+=row("Open Actions LOD2/3",d=>
actions.filter(f=>{
const a=assurances.find(x=>x.id===f.assurance_id);
return a && a.depot===d && (a.assurance_type==="LOD2"||a.assurance_type==="LOD3") && f.status!=="Closed";
}).length
);

html+=row("Overdue Actions LOD2/3",d=>{

const overdue = actions.filter(f=>{
const a=assurances.find(x=>x.id===f.assurance_id);
return a && a.depot===d && (a.assurance_type==="LOD2"||a.assurance_type==="LOD3") && f.status!=="Closed" && f.target_date && f.target_date<today;
}).length;

let cls = overdue > 0 ? "kpi-bad" : "kpi-good";

return `<span class="${cls}">${overdue}</span>`;

});

html+=`<tr class="section">
<td colspan="12">
Financial Performance - KPIs &nbsp;&nbsp;
<select id="monthFilter" style="padding:3px;font-family:'72 Condensed';">
<option value="1">Jan</option>

<option value="12" selected>Dec</option>
</select>
</td>
</tr>`;

 html+=`
<tr>
<th>Metric</th>
<th>KMR</th>
<th>SKP</th>
<th>DLP</th>
<th>CKL</th>
<th>TJB</th>
<th>MCH</th>
<th>BKR</th>
<th>VHR</th>
<th>MHK</th>
<th>GTI</th>
<th class="total-col">S&H</th>
</tr>
`;

html+=row("YTD Performance",d=>{

// Current year YTD
const A = sum(directCY,d)+sum(indirectCY,d);
const B = sum(volumeCY,d);

// Last year YTD volume
const F = sum(volumeLY,d);

// Last year FULL FY
const G = directLY
.filter(x=>x.depot===d)
.reduce((s,x)=>s+(x.value||0),0)
+
indirectLY
.filter(x=>x.depot===d)
.reduce((s,x)=>s+(x.value||0),0);

const H = volumeLY
.filter(x=>x.depot===d)
.reduce((s,x)=>s+(x.value||0),0);

// KPIs
const J = F ? (A/F) : null;
const K = H ? (G/H) : null;

if(!J || !K) return "-";

const perf = (K/J);

let cls="kpi-neutral";
if(perf>1) cls="kpi-good";
if(perf<1) cls="kpi-bad";

return `<span class="${cls}">${perf.toFixed(2)}</span>`;

},"sh");
 
html+=row(`YTD Unit Cost ${year} PKR/L`,d=>{

const costCY = sum(directCY,d)+sum(indirectCY,d);
const volCY = sum(volumeCY,d);

const costLY = sum(directLY,d)+sum(indirectLY,d);
const volLY = sum(volumeLY,d);

const cy = volCY ? (costCY/volCY) : 0;
const ly = volLY ? (costLY/volLY) : 0;

const value = cy.toFixed(2);

let arrow="";
if(cy < ly) arrow=`<span class="arrow-good">↓</span>`;
if(cy > ly) arrow=`<span class="arrow-bad">↑</span>`;

return `${value} ${arrow}`;

},"sh");

html+=row(`YTD Unit Cost ${lastYear} PKR/L`,d=>{

const cost=sum(directLY,d)+sum(indirectLY,d);
const vol=sum(volumeLY,d);

return unitCost(cost,vol);

},"sh");

html+=row(`YTD Volume ${year} (ML)`, d=>{

const cy = sum(volumeCY,d);
const ly = sum(volumeLY,d);

const value = (cy/1000000).toFixed(2);

let arrow="";
if(cy>ly) arrow=`<span class="arrow-good">↑</span>`;
if(cy<ly) arrow=`<span class="arrow-bad">↓</span>`;

return `${value} ${arrow}`;

},"sh");

html+=row(`YTD Volume ${lastYear} (ML)`, d=>{
return (sum(volumeLY,d)/1000000).toFixed(2);
},"sh");

html+=row(`YTD Direct Cost ${year} (MPKR)`, d=>{

const cy = sum(directCY,d);
const ly = sum(directLY,d);

const value = (cy/1000000).toFixed(2);

let arrow="";
if(cy<ly) arrow=`<span class="arrow-good">↓</span>`;
if(cy>ly) arrow=`<span class="arrow-bad">↑</span>`;

return `${value} ${arrow}`;

},"sh");

html+=row(`YTD Direct Cost ${lastYear} (MPKR)`, d=>{
return (sum(directLY,d)/1000000).toFixed(2);
},"sh");

html+=row(`YTD Indirect Cost ${year} (MPKR)`, d=>{

const cy = sum(indirectCY,d);
const ly = sum(indirectLY,d);

const value = (cy/1000000).toFixed(2);

let arrow="";
if(cy<ly) arrow=`<span class="arrow-good">↓</span>`;
if(cy>ly) arrow=`<span class="arrow-bad">↑</span>`;

return `${value} ${arrow}`;

},"sh");

html+=row(`YTD Indirect Cost ${lastYear} (MPKR)`, d=>{
return (sum(indirectLY,d)/1000000).toFixed(2);
},"sh");



document.getElementById("tableBody").innerHTML=html;
const lod1MonthSel=document.getElementById("lod1MonthFilter");

if(lod1MonthSel){
if(!lod1MonthSel.dataset.initialized){
lod1MonthSel.value = lod1Month;
lod1MonthSel.dataset.initialized = true;
}
lod1MonthSel.addEventListener("change",loadDashboard);
}
const monthSel=document.getElementById("monthFilter");
if(monthSel){

if(!monthSel.dataset.initialized){
monthSel.value = month;
monthSel.dataset.initialized = true;
}

monthSel.addEventListener("change",loadDashboard);
}

}

document.getElementById("yearFilter").addEventListener("change",loadDashboard);

async function logout(){
await supabaseClient.auth.signOut();
window.location="login.html";
}

loadDashboard();
