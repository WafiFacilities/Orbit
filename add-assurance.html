<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Add Assurance</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@font-face { font-family:'72 Condensed'; src:local('72 Condensed'); }
body{font-family:'72 Condensed',Arial;margin:0;background:#f4f6f9;}

.header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:white;border-bottom:2px solid #e0e0e0;}
.header-left{display:flex;align-items:center;gap:12px;}
.header-left img{height:40px;}
.wafi-logo{height:40px;}
.header-title{font-size:22px;color:#404040;font-weight:bold;text-transform:uppercase;}

.layout{display:flex;height:calc(100vh - 62px);}
.sidebar{
width:220px;background:#404040;color:white;
display:flex;flex-direction:column;padding-top:20px;
}
.sidebar h4{
  padding:10px 20px;
  margin:10px 0 5px 0;
  background:#2f2f2f;
  border-left:4px solid #16a34a;
}
.sidebar a{color:white;padding:10px 30px;text-decoration:none;display:block;}
.sidebar a:hover{background:#505050;}
.sidebar .logout{margin-top:auto;border-top:1px solid #555;}

.main{flex:1;padding:20px;overflow-y:auto;}
.container{background:white;padding:20px;border-radius:6px;box-shadow:0 2px 6px rgba(0,0,0,0.1);max-width:900px;}

.field-row{display:flex;margin-bottom:12px;align-items:center;}
.field-row label{flex:0 0 220px;font-weight:bold;}
.field-row input,.field-row select,.field-row textarea{
flex:1;padding:6px;border-radius:4px;border:1px solid #ccc;font-family:'72 Condensed';
}

button{padding:8px 16px;background:#76B531;color:white;border:none;border-radius:4px;cursor:pointer;}
.success{color:green;}
.error{color:red;}
</style>
</head>

<body>

<div class="header">
<div class="header-left">
<img src="orbit-logo.png">
<h1 class="header-title">M&D FACILITIES – ORBIT PORTAL</h1>
</div>
<img src="wafi-logo.png" class="wafi-logo">
</div>

<div class="layout">

<div class="sidebar">

  <a href="dashboard.html"><h4>INITIATIVE</h4></a>

   <a href="projects.html"><h4>PROJECTS</h4></a>

  <a href="assurances.html"><h4>ASSURANCE</h4></a>
   <a href="assurances.html">Assurance List</a>
  <a href="assuranceactions.html">Actions List</a>
  <a href="lod1-completion.html">LOD1 Matrix</a>
  <a href="add-assurance.html">Add New Assurance</a>

   <a href="people-employees.html"><h4>PEOPLE</h4></a>

   <a href="financial-dashboard.html"><h4>FINANCIAL</h4></a>
  
  <a href="mydetails.html" class="logout">My Details</a>
  <a href="#" onclick="logout()" class="logout">Logout</a>

</div>

<div class="main">
<h2>Add New Assurance</h2>

<div class="container">

<form id="assuranceForm">

<div class="field-row">
<label>Assurance Name:</label>
<input id="assurance_name" required>
</div>

<div class="field-row">
<label>Depot:</label>
<select id="depot" required>
<option value="">Select Depot</option>
<option>KMR</option><option>CKL</option><option>MCH</option>
<option>SKP</option><option>DLP</option><option>TJB</option>
<option>BHK</option><option>SSH</option><option>VHR</option>
<option>GTI</option>
</select>
</div>

<div class="field-row">
<label>Scope Area:</label>
<select id="scope_area" required>
<option value="">Select Scope Area</option>
<option>1) Product Quality (PQ)</option>
<option>2) Site Operating HEMP Review</option>
<option>3) Statement of Fitness (SoF)</option>
<option>4) Inspection and Maintenance</option>
<option>5) Management of Change (MOC)</option>
<option>6) Permit to Work (PtW)/option>
<option>7) Operational Controls Review</option>
<option>8) Site Security</option>
<option>9) Emergency Response </option>
<option>10) Capex Projects Self Assurance</option>
<option>11) Terminal Engineering Self Assurance</option>
<option>12) Previous audits review </option>
<option>Sustained Assurance</option>
<option>Other</option>
</select>
</div>

<div class="field-row">
<label>Assurance Type:</label>
<select id="assurance_type" required>
<option value="">Select Type</option>
<option>LOD1</option>
<option>LOD2</option>
<option>LOD3</option>
</select>
</div>

<div class="field-row">
<label>Assurance Lead Email:</label>
<input type="email" id="owner_email" required>
</div>

<div class="field-row">
<label>Planned Start Date:</label>
<input type="date" id="start_date">
</div>

<div class="field-row">
<label>Planned Finish Date:</label>
<input type="date" id="finish_date">
</div>

<div class="field-row">
<label>Description:</label>
<textarea id="description"></textarea>
</div>

<button type="submit">Create Assurance</button>

<p class="success" id="successMsg" style="display:none;">Assurance Created</p>
<p class="error" id="errorMsg"></p>

</form>
</div>
</div>
</div>

<script>
const supabaseClient = supabase.createClient( "https://kqhbvmqxrwwspopwckah.supabase.co", "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxaGJ2bXF4cnd3c3BvcHdja2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3MTYyOTAsImV4cCI6MjA4NjI5MjI5MH0.uKfFMK7GBtCR8P5n7hsJlN72-w5h0oyOhuaySphmns8" );

document.getElementById("assuranceForm").addEventListener("submit", async (e)=>{
e.preventDefault();

const session = await supabaseClient.auth.getSession();

const {data, error} = await supabaseClient
.from("assurances")
.insert([{
assurance_name: assurance_name.value,
depot: depot.value,
scope_area: scope_area.value,
assurance_type: assurance_type.value,
assurance_owner_email: owner_email.value,
planned_start_date: start_date.value || null,
planned_finish_date: finish_date.value || null,
brief_description: description.value,
created_by_email: session.data.session.user.email
}])
.select();   // IMPORTANT → return inserted row

if(error){
errorMsg.innerText = error.message;
return;
}

// Redirect to detail page
const newId = data[0].id;
window.location = `assurance-detail.html?id=${newId}`;
});

async function logout(){
await supabaseClient.auth.signOut();
window.location="login.html";
}
</script>

</body>
</html>
