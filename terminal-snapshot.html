<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Country Ops Command Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@font-face { font-family:'72 Condensed'; src:local('72 Condensed'); }

body{
  margin:0;
  font-family:'72 Condensed',Arial;
  background:#0f172a;
  color:white;
}

/* HEADER */

.header{
  padding:15px 30px;
  background:#111827;
  border-bottom:2px solid #1f2937;
  font-size:22px;
  font-weight:700;
  letter-spacing:1px;
}

/* MAIN */

.main{
  padding:25px 35px;
}

/* SECTION TITLE */

.section-title{
  font-size:14px;
  letter-spacing:2px;
  color:#9ca3af;
  margin:30px 0 15px;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

/* KPI CARD */

.kpi{
  background:linear-gradient(145deg,#111827,#0b1220);
  border:1px solid #1f2937;
  border-radius:8px;
  padding:20px;
  position:relative;
}

.kpi-title{
  font-size:13px;
  color:#9ca3af;
  margin-bottom:15px;
  letter-spacing:1px;
}

.kpi-big{
  font-size:48px;
  font-weight:700;
  line-height:1;
}

.kpi-sub{
  font-size:18px;
  margin-top:8px;
  color:#94a3b8;
}

.delta{
  position:absolute;
  top:20px;
  right:20px;
  font-size:18px;
  font-weight:700;
}

.up{color:#22c55e;}
.down{color:#ef4444;}
.warn{color:#f59e0b;}

/* MINI COMPARISON */

.compare{
  margin-top:15px;
  font-size:14px;
  color:#94a3b8;
}

.compare span{
  display:block;
  margin-top:4px;
}

/* STRATEGY CHIPS */

.chip-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
}

.chip{
  background:#111827;
  border:1px solid #1f2937;
  padding:15px;
  border-radius:6px;
  text-align:center;
}

.chip h4{
  font-size:12px;
  color:#9ca3af;
  margin-bottom:8px;
}

.chip .value{
  font-size:22px;
  font-weight:700;
}

</style>
</head>

<body>

<div class="header">
COUNTRY OPERATIONS COMMAND DASHBOARD
</div>

<div class="main">

<div id="snapshotContent"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
"https://kqhbvmqxrwwspopwckah.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxaGJ2bXF4cnd3c3BvcHdja2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3MTYyOTAsImV4cCI6MjA4NjI5MjI5MH0.uKfFMK7GBtCR8P5n7hsJlN72-w5h0oyOhuaySphmns8"
);

const currentYear = 2025;
const previousYear = 2024;

function formatMPKR(val){ return val?(val/1000000).toFixed(1):"0.0"; }
function formatUC(val){ return val?val.toFixed(2):"0.00"; }

async function loadSnapshot(){

let html="";

/* FINANCIAL */

const {data:financial} = await supabaseClient
.from("v_snapshot_financial")
.select("*")
.in("year",[previousYear,currentYear]);

function compute(year){
  const data=financial.filter(r=>r.year===year);
  let cost=0,vol=0;
  data.forEach(r=>{cost+=r.total_cost||0;vol+=r.volume||0;});
  return {cost,vol,uc:vol?cost/vol:0};
}

const prev=compute(previousYear);
const curr=compute(currentYear);

const deltaUC=((curr.uc-prev.uc)/prev.uc)*100 || 0;

/* ASSURANCE */

const {data:ass} = await supabaseClient
.from("v_snapshot_assurance")
.select("*")
.in("year",[previousYear,currentYear]);

const openAssurance = ass.filter(x=>x.year===currentYear && x.action_status!=="Closed").length;

/* INITIATIVES */

const {data:init} = await supabaseClient
.from("initiatives")
.select("*")
.eq("year",currentYear);

const closedInit = init.filter(x=>x.status==="Closed").length;
const openInit = init.filter(x=>x.status!=="Closed"&&x.status!=="Dropped").length;

/* OPEX */

const {data:proj} = await supabaseClient
.from("projects")
.select("*")
.eq("project_type","Opex")
.eq("year",currentYear);

const openOpex = proj.filter(x=>x.status!=="Closed").length;

/* BUILD HTML */

html+=`

<div class="section-title">FINANCIAL DOMINANCE</div>

<div class="grid">

<div class="kpi">
<div class="kpi-title">UNIT COST (YTD)</div>
<div class="kpi-big">${formatUC(curr.uc)}</div>
<div class="kpi-sub">${currentYear}</div>
<div class="delta ${deltaUC<0?'up':'down'}">
${deltaUC.toFixed(1)}%
</div>
<div class="compare">
<span>${previousYear}: ${formatUC(prev.uc)}</span>
</div>
</div>

<div class="kpi">
<div class="kpi-title">TOTAL COST (MPKR)</div>
<div class="kpi-big">${formatMPKR(curr.cost)}</div>
<div class="kpi-sub">${currentYear}</div>
<div class="compare">
<span>${previousYear}: ${formatMPKR(prev.cost)}</span>
</div>
</div>

<div class="kpi">
<div class="kpi-title">VOLUME</div>
<div class="kpi-big">${curr.vol.toLocaleString()}</div>
<div class="kpi-sub">${currentYear}</div>
<div class="compare">
<span>${previousYear}: ${prev.vol.toLocaleString()}</span>
</div>
</div>

</div>

<div class="section-title">GOVERNANCE PRESSURE</div>

<div class="grid">

<div class="kpi">
<div class="kpi-title">OPEN ASSURANCE ACTIONS</div>
<div class="kpi-big ${openAssurance>20?'down':'up'}">
${openAssurance}
</div>
</div>

<div class="kpi">
<div class="kpi-title">OPEN OPEX PROJECTS</div>
<div class="kpi-big ${openOpex>10?'warn':'up'}">
${openOpex}
</div>
</div>

</div>

<div class="section-title">STRATEGY DELIVERY</div>

<div class="chip-grid">

<div class="chip">
<h4>CLOSED INITIATIVES</h4>
<div class="value">${closedInit}</div>
</div>

<div class="chip">
<h4>PIPELINE INITIATIVES</h4>
<div class="value">${openInit}</div>
</div>

</div>
`;

document.getElementById("snapshotContent").innerHTML=html;
}

loadSnapshot();

</script>

</body>
</html>
