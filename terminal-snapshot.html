<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Terminal Executive Snapshot</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
@font-face { font-family:'72 Condensed'; src:local('72 Condensed'); }

body{
  font-family:'72 Condensed',Arial;
  margin:0;
  background:#f6f8fa;
}

.header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 20px;
  background:white;
  border-bottom:1px solid #e5e7eb;
}

.header-title{
  font-size:20px;
  font-weight:600;
  color:#404040;
  letter-spacing:1px;
}

.layout{display:flex;height:calc(100vh - 60px);}

.sidebar{
  width:200px;
  background:#404040;
  color:white;
  padding-top:20px;
  display:flex;
  flex-direction:column;
}

.sidebar h4{padding:8px 20px;margin:0;font-size:13px;color:#ccc;}
.sidebar a{padding:8px 25px;color:white;text-decoration:none;font-size:13px;}
.sidebar a:hover{background:#505050;}
.sidebar .logout{margin-top:auto;border-top:1px solid #555;}

.main{
  flex:1;
  padding:20px 30px;
  overflow-y:auto;
}

.filters{
  margin-bottom:15px;
}

.filters select{
  padding:6px 8px;
  border:1px solid #ccc;
  border-radius:4px;
}

.section-title{
  font-size:14px;
  font-weight:600;
  color:#555;
  margin:20px 0 10px;
  letter-spacing:0.5px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:12px;
}

.card{
  background:white;
  border:1px solid #e5e7eb;
  border-radius:6px;
  padding:12px;
}

.card h3{
  font-size:13px;
  font-weight:600;
  margin-bottom:8px;
  color:#333;
}

.metric-row{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin:4px 0;
}

.metric-row span:last-child{
  font-weight:600;
}

.delta-up{color:#2ecc71;}
.delta-down{color:#e74c3c;}
.subtle{color:#888;font-size:12px;}

.small-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:8px;
}

.chip{
  background:#f2f4f7;
  padding:6px;
  border-radius:4px;
  font-size:12px;
  text-align:center;
}

</style>
</head>

<body>

<div class="header">
  <div class="header-title">M&D FACILITIES – COUNTRY OPERATIONS SNAPSHOT</div>
</div>

<div class="layout">

<div class="sidebar">
<h4>DASHBOARD</h4>
<a href="terminal-snapshot.html">Executive Snapshot</a>
<a href="#" onclick="logout()" class="logout">Logout</a>
</div>

<div class="main">

<div class="filters">
<select id="depotFilter">
<option value="">All Depots</option>
<option>KMR</option><option>CKL</option><option>MCH</option>
<option>SKP</option><option>DLP</option><option>TJB</option>
<option>BHK</option><option>SSH</option><option>VHR</option>
<option>GTI</option><option>MMK</option>
</select>
<button onclick="loadSnapshot()">Refresh</button>
</div>

<div id="snapshotContent"></div>

</div>
</div>

<script>

const supabaseClient = supabase.createClient(
"https://kqhbvmqxrwwspopwckah.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtxaGJ2bXF4cnd3c3BvcHdja2FoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA3MTYyOTAsImV4cCI6MjA4NjI5MjI5MH0.uKfFMK7GBtCR8P5n7hsJlN72-w5h0oyOhuaySphmns8"
);

const currentYear = 2025;
const previousYear = 2024;

function formatMPKR(val){ return val?(val/1000000).toFixed(1):"0.0"; }
function formatUC(val){ return val?val.toFixed(2):"0.00"; }

async function loadSnapshot(){

snapshotContent.innerHTML="";
let html="";

const depot=depotFilter.value;

/* ================= FINANCIAL ================= */

let finQuery=supabaseClient
.from("v_snapshot_financial")
.select("*")
.in("year",[previousYear,currentYear]);

if(depot) finQuery=finQuery.eq("depot",depot);

const {data:financial}=await finQuery;

function compute(year){
  const data=financial.filter(r=>r.year===year);
  let cost=0,vol=0;
  data.forEach(r=>{cost+=r.total_cost||0;vol+=r.volume||0;});
  return {
    cost,
    vol,
    uc:vol?cost/vol:0
  };
}

const prev=compute(previousYear);
const curr=compute(currentYear);

const deltaUC=((curr.uc-prev.uc)/prev.uc)*100 || 0;

/* ================= ASSURANCE ================= */

let assQuery=supabaseClient
.from("v_snapshot_assurance")
.select("*")
.in("year",[previousYear,currentYear]);

if(depot) assQuery=assQuery.eq("depot",depot);

const {data:ass}=await assQuery;

function buildAssurance(year){
  const data=ass.filter(x=>x.year===year);
  return data.filter(x=>x.action_status!=="Closed").length;
}

/* ================= INITIATIVES ================= */

let initQuery=supabaseClient
.from("initiatives")
.select("*")
.in("year",[previousYear,currentYear]);

if(depot) initQuery=initQuery.eq("terminal_name",depot);

const {data:init}=await initQuery;

function buildInitiatives(year){
  const data=init.filter(x=>x.year===year);
  const closed=data.filter(x=>x.status==="Closed").length;
  const open=data.filter(x=>x.status!=="Closed"&&x.status!=="Dropped").length;
  return {total:data.length,closed,open};
}

/* ================= OPEX ================= */

let projQuery=supabaseClient
.from("projects")
.select("*")
.eq("project_type","Opex")
.in("year",[previousYear,currentYear]);

if(depot) projQuery=projQuery.eq("terminal_name",depot);

const {data:proj}=await projQuery;

function buildOpex(year){
  const data=proj.filter(x=>x.year===year);
  return {
    total:data.length,
    open:data.filter(x=>x.status!=="Closed").length
  };
}

html+=`

<div class="section-title">FINANCIAL PERFORMANCE</div>
<div class="grid">

<div class="card">
<h3>Unit Cost (YTD)</h3>
<div class="metric-row"><span>${previousYear}</span><span>${formatUC(prev.uc)}</span></div>
<div class="metric-row"><span>${currentYear}</span><span>${formatUC(curr.uc)}</span></div>
<div class="metric-row subtle"><span>Δ</span><span class="${deltaUC<0?'delta-up':'delta-down'}">${deltaUC.toFixed(1)}%</span></div>
</div>

<div class="card">
<h3>YTD Cost (MPKR)</h3>
<div class="metric-row"><span>${previousYear}</span><span>${formatMPKR(prev.cost)}</span></div>
<div class="metric-row"><span>${currentYear}</span><span>${formatMPKR(curr.cost)}</span></div>
</div>

<div class="card">
<h3>YTD Volume</h3>
<div class="metric-row"><span>${previousYear}</span><span>${prev.vol.toLocaleString()}</span></div>
<div class="metric-row"><span>${currentYear}</span><span>${curr.vol.toLocaleString()}</span></div>
</div>

</div>

<div class="section-title">ASSURANCE GOVERNANCE</div>
<div class="grid">

<div class="card">
<h3>Open Actions</h3>
<div class="metric-row"><span>${previousYear}</span><span>${buildAssurance(previousYear)}</span></div>
<div class="metric-row"><span>${currentYear}</span><span>${buildAssurance(currentYear)}</span></div>
</div>

</div>

<div class="section-title">STRATEGY & DELIVERY</div>
<div class="grid">

<div class="card">
<h3>Initiatives</h3>
<div class="metric-row"><span>${previousYear}</span><span>${buildInitiatives(previousYear).closed} Closed</span></div>
<div class="metric-row"><span>${currentYear}</span><span>${buildInitiatives(currentYear).closed} Closed</span></div>
</div>

<div class="card">
<h3>Opex Projects</h3>
<div class="metric-row"><span>${previousYear}</span><span>${buildOpex(previousYear).open} Open</span></div>
<div class="metric-row"><span>${currentYear}</span><span>${buildOpex(currentYear).open} Open</span></div>
</div>

</div>
`;

snapshotContent.innerHTML=html;
}

async function logout(){
await supabaseClient.auth.signOut();
window.location="login.html";
}

loadSnapshot();

</script>
</body>
</html>
